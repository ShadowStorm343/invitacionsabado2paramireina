<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación Romántica</title>
  <style>
    body {
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      font-family: 'Georgia', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .invitacion {
      background: #fff;
      border: 3px solid #e91e63;
      border-radius: 20px;
      padding: 40px;
      width: 600px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: aparecer 1.5s ease;
    }

    .invitacion h1 {
      color: #e91e63;
      margin-bottom: 20px;
      font-family: 'Cursive', sans-serif;
    }

    .invitacion p {
      font-size: 1.2em;
      color: #333;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .detalles {
      font-size: 1.1em;
      color: #444;
      margin: 20px 0;
    }

    .boton {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: #e91e63;
      padding: 12px 25px;
      border-radius: 10px;
      transition: background 0.3s, transform 0.2s;
      font-weight: bold;
    }

    .boton:hover {
      background: #ad1457;
      transform: scale(1.05);
    }

    @keyframes aparecer {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="invitacion">
    <h1>🌹 Invitación para mi preciosa 🌹</h1>
    <p>
      Querida Cielito linda :3,<br><br>
      Me encantaría invitarte a una salida romántica,<br>
      para compartir risas, miradas y momentos únicos.<br><br>
      Será un sábado para recordar ✨
    </p>
    <div class="detalles">
      📍 Lugar: Sorpresa :3<br>
      📅 Fecha: Sábado 2 de Mayo<br>
      ⏰ Hora: 1:00 PM aprox.
    </div>
  </div>
</body>
</html>
